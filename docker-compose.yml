# docker-compose.yml — Photo Metadata Extractor
#
# Запуск:
#   docker compose up --build
#   Открыть: http://localhost:8080
#
# Настройки в .env:
#   PHOTOS_DIR  — путь к папке с фото (по умолчанию ./photos)
#   PORT        — порт веб-интерфейса (по умолчанию 8080)
#
# Опциональные NPU-профили (CLI без UI):
#   docker compose --profile amd up --build
#   docker compose --profile intel up --build

services:
  # ── Web UI + CPU extraction (по умолчанию) ───────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: photo-metadata-extractor-web
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ${PHOTOS_DIR:-./photos}:/data:rw
      - ${BROWSE_ROOT:-/home}:/host:rw
      - model-cache:/app/models
    environment:
      - PME_ROOT_DIR=/data
      - PME_EXECUTION_PROVIDER=CPUExecutionProvider
      - PME_NUM_COLORS=${NUM_COLORS:-5}
      - PME_SKIP_EXISTING=${SKIP_EXISTING:-true}
    restart: unless-stopped

  # ── AMD Ryzen AI (XDNA NPU) — только CLI ─────────────────────
  extractor-amd:
    profiles: ["amd"]
    build:
      context: .
      dockerfile: Dockerfile.amd
    container_name: photo-metadata-extractor-amd

    volumes:
      - ${PHOTOS_DIR:-./photos}:/data:rw
      - model-cache:/app/models

    environment:
      - PME_ROOT_DIR=/data
      - PME_EXECUTION_PROVIDER=auto
      - PME_NPU_DEVICE=${NPU_DEVICE:-NPU}
      - PME_NUM_COLORS=${NUM_COLORS:-5}
      - PME_SKIP_EXISTING=${SKIP_EXISTING:-true}

    devices:
      - /dev/accel:/dev/accel

    group_add:
      - video
      - render

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ── Intel NPU (OpenVINO) — только CLI ────────────────────────
  extractor-intel:
    profiles: ["intel"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photo-metadata-extractor-intel

    volumes:
      - ${PHOTOS_DIR:-./photos}:/data:rw
      - model-cache:/app/models

    environment:
      - PME_ROOT_DIR=/data
      - PME_EXECUTION_PROVIDER=OpenVINOExecutionProvider
      - PME_NPU_DEVICE=${NPU_DEVICE:-NPU}
      - PME_NUM_COLORS=${NUM_COLORS:-5}
      - PME_SKIP_EXISTING=${SKIP_EXISTING:-true}

    devices:
      - /dev/accel:/dev/accel

    group_add:
      - video
      - render

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

volumes:
  model-cache:
    driver: local
